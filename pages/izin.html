<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajukan Izin - Woolspace</title>
    <link rel="stylesheet" href="../assets/css/base.css">
    <link rel="stylesheet" href="../assets/css/layout.css">
    <link rel="stylesheet" href="../assets/css/components.css">
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/responsive.css">
</head>
<body>
    <div class="app-container">
        <div class="main-card">
            <header>
                <h2 class="app-title" style="font-size: 24px; color: var(--warning-orange);">🤒 Form Izin</h2>
                <p class="company-name" style="margin-top: 5px;">WOOLSPACE HRIS</p>
            </header>

            <form id="izinForm">
                <div class="form-group">
                    <label>Nama Karyawan</label>
                    <select id="nama" required>
                        <option value="">-- Memuat Data Karyawan --</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Jabatan</label>
                    <input type="text" id="jabatan" readonly placeholder="Otomatis terisi">
                </div>

                <div class="form-group">
                    <label>Kategori Izin</label>
                    <select id="alasan" required>
                        <option value="">-- Pilih Alasan --</option>
                        <option value="Sakit">Sakit</option>
                        <option value="Keperluan Pribadi/Keluarga">Keperluan Pribadi/Keluarga</option>
                        <option value="Terlambat">Terlambat</option>
                        <option value="Work From Home">Work From Home (WFH)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Detail Keterangan</label>
                    <input type="text" id="keterangan" required placeholder="Contoh: Flu & batuk disertai pusing">
                </div>

                <div class="button-group" style="margin-top: 25px;">
                    <button type="submit" class="btn btn-izin" id="btnSubmit">Kirim Izin</button>
                </div>
            </form>
            
            <a href="../index.html" class="btn btn-nav" style="margin-top: 15px; background-color: #f1f5f9; color: #334155;">⬅ Kembali ke Halaman Utama</a>
        </div>
    </div>

    <!-- Tambahkan library SweetAlert2 di sini -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script src="../assets/js/config.js"></script>
    <script src="../assets/js/api.js"></script>
    <script src="../assets/js/izin.js"></script>
</body>
</html>
