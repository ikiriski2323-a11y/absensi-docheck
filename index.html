<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Absensi Woolspace</title>
    
    <!-- Memanggil CSS Modular Anda -->
    <link rel="stylesheet" href="assets/css/base.css">
    <link rel="stylesheet" href="assets/css/layout.css">
    <link rel="stylesheet" href="assets/css/components.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/responsive.css">
</head>
<body>
    <div class="app-container">
        <div class="main-card">
            <header>
                <div class="logo-container">
                    <!-- Memanggil gambar logo.png -->
                    <img src="assets/images/logo.png" alt="Logo Woolspace" style="max-height: 45px;">
                </div>
                <h2 class="app-title">Absensi Karyawan</h2>
            </header>

            <div class="info-section">
                <p class="current-date" id="dateDisplay">Memuat Tanggal...</p>
                <p class="current-time" id="timeDisplay">--:--:--</p>
                <div id="locationStatus" class="location-status processing">Mencari Lokasi...</div>
            </div>

            <form id="absensiForm">
                <div class="form-group">
                    <label>Pilih Nama Karyawan</label>
                    <select id="nama" required>
                        <option value="">-- Memuat Data Karyawan --</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Jabatan</label>
                    <input type="text" id="jabatan" readonly placeholder="Otomatis terisi">
                </div>

                <!-- Input tersembunyi untuk menyimpan GPS -->
                <input type="hidden" id="latitude">
                <input type="hidden" id="longitude">

                <!-- Tombol Absen Utama -->
                <div class="button-group row-2">
                    <button type="button" class="btn btn-masuk" onclick="prosesAbsen('Masuk')">Absen Masuk</button>
                    <button type="button" class="btn btn-pulang" onclick="prosesAbsen('Pulang')">Absen Pulang</button>
                </div>
            </form>

            <hr class="divider">

            <!-- Navigasi ke Halaman Lain -->
            <p class="nav-title">Menu Form Lainnya:</p>
            <div class="button-group row-2">
                <a href="pages/lapangan.html" class="btn btn-lapangan">Absen Lapangan</a>
                <a href="pages/izin.html" class="btn btn-izin">Izin</a>
                <a href="pages/cuti.html" class="btn btn-cuti">Cuti</a>
                <a href="pages/lembur.html" class="btn btn-lembur">Lembur</a>
            </div>
        </div>
    </div>

    <!-- Tambahkan library SweetAlert2 di sini -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <!-- PENTING: Memanggil JS secara berurutan -->
    <script src="assets/js/config.js"></script>
    <script src="assets/js/api.js"></script>
    <script src="assets/js/app.js"></script>
</body>
</html>
